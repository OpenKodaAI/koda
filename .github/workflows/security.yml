name: security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-audit:
    name: dependency-audit
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            uv.lock
      - uses: pnpm/action-setup@v4.2.0
        with:
          version: 10.26.2
      - uses: actions/setup-node@v6.3.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install Python dependencies
        run: pip install ".[dev]"
      - name: Install web dependencies
        run: pnpm install --frozen-lockfile
      - name: Python dependency audit
        run: pip-audit --strict
      - name: Node dependency audit
        run: pnpm audit --audit-level=high
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Rust dependency audit
        run: cargo audit --file rust/Cargo.lock

  sast:
    name: sast
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            uv.lock
      - name: Install Python dependencies
        run: pip install ".[dev]"
      - name: Bandit SAST scan
        run: bandit -r koda/ -ll --skip B101
      - name: Install Gitleaks
        run: |
          set -euo pipefail
          VERSION=8.30.1
          ARCH="$(uname -m)"
          case "${ARCH}" in
            x86_64) ASSET="gitleaks_${VERSION}_linux_x64.tar.gz" ;;
            aarch64|arm64) ASSET="gitleaks_${VERSION}_linux_arm64.tar.gz" ;;
            *) echo "Unsupported architecture: ${ARCH}" >&2; exit 1 ;;
          esac
          curl -fsSLO "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/${ASSET}"
          curl -fsSLO "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_checksums.txt"
          grep " ${ASSET}$" "gitleaks_${VERSION}_checksums.txt" | sha256sum -c -
          tar -xzf "${ASSET}" gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
      - name: Run Gitleaks
        run: |
          mkdir -p artifacts/security
          gitleaks git . \
            --report-format sarif \
            --report-path artifacts/security/gitleaks.sarif \
            --redact \
            --exit-code 1
      - name: Upload Gitleaks SARIF
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: github/codeql-action/upload-sarif@v4.35.1
        with:
          sarif_file: artifacts/security/gitleaks.sarif
          category: gitleaks
      - name: Upload SAST artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: sast-artifacts
          path: artifacts/security/
          if-no-files-found: ignore

  codeql:
    name: codeql
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.35.1
        with:
          languages: ${{ matrix.language }}
          build-mode: none
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4.35.1
        with:
          category: /language:${{ matrix.language }}

  container-scan:
    name: container-scan
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Build container images
        run: |
          docker build -t koda:ci .
          docker build -f apps/web/Dockerfile -t koda-web:ci .
          docker build -f Dockerfile.memory -t koda-memory:ci .
          docker build -f Dockerfile.security -t koda-security:ci .
      - name: Install Trivy
        run: |
          set -euo pipefail
          VERSION=0.69.3
          ARCH="$(uname -m)"
          case "${ARCH}" in
            x86_64) ASSET="trivy_${VERSION}_Linux-64bit.tar.gz" ;;
            aarch64|arm64) ASSET="trivy_${VERSION}_Linux-ARM64.tar.gz" ;;
            *) echo "Unsupported architecture: ${ARCH}" >&2; exit 1 ;;
          esac
          curl -fsSLO "https://github.com/aquasecurity/trivy/releases/download/v${VERSION}/${ASSET}"
          curl -fsSLO "https://github.com/aquasecurity/trivy/releases/download/v${VERSION}/trivy_${VERSION}_checksums.txt"
          grep " ${ASSET}$" "trivy_${VERSION}_checksums.txt" | sha256sum -c -
          tar -xzf "${ASSET}" trivy
          sudo install trivy /usr/local/bin/trivy
      - name: Scan container images with Trivy
        run: |
          mkdir -p artifacts/security/trivy
          trivy image --severity HIGH,CRITICAL --scanners vuln --format sarif --output artifacts/security/trivy/koda.sarif --exit-code 1 koda:ci
          trivy image --severity HIGH,CRITICAL --scanners vuln --format sarif --output artifacts/security/trivy/koda-web.sarif --exit-code 1 koda-web:ci
          trivy image --severity HIGH,CRITICAL --scanners vuln --format sarif --output artifacts/security/trivy/koda-memory.sarif --exit-code 1 koda-memory:ci
          trivy image --severity HIGH,CRITICAL --scanners vuln --format sarif --output artifacts/security/trivy/koda-security.sarif --exit-code 1 koda-security:ci
      - name: Upload Trivy SARIF for koda
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: github/codeql-action/upload-sarif@v4.35.1
        with:
          sarif_file: artifacts/security/trivy/koda.sarif
          category: trivy-koda
      - name: Upload Trivy SARIF for koda-web
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: github/codeql-action/upload-sarif@v4.35.1
        with:
          sarif_file: artifacts/security/trivy/koda-web.sarif
          category: trivy-koda-web
      - name: Upload Trivy SARIF for koda-memory
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: github/codeql-action/upload-sarif@v4.35.1
        with:
          sarif_file: artifacts/security/trivy/koda-memory.sarif
          category: trivy-koda-memory
      - name: Upload Trivy SARIF for koda-security
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: github/codeql-action/upload-sarif@v4.35.1
        with:
          sarif_file: artifacts/security/trivy/koda-security.sarif
          category: trivy-koda-security
      - name: Upload container scan artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: container-scan-artifacts
          path: artifacts/security/trivy/
          if-no-files-found: ignore
