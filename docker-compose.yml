services:
  app:
    build: .
    command: ["python", "-m", "koda.control_plane"]
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      seaweedfs-init:
        condition: service_completed_successfully
      security:
        condition: service_started
      memory:
        condition: service_started
    environment:
      HOME: "/var/lib/koda/runtime/home"
      CLAUDE_HOME: "/var/lib/koda/runtime/home"
      CLAUDE_CONFIG_DIR: "/var/lib/koda/runtime/claude-config"
      CONTROL_PLANE_ENABLED: "true"
      CONTROL_PLANE_BIND: "0.0.0.0"
      CONTROL_PLANE_PORT: "${CONTROL_PLANE_PORT:-8090}"
      SECURITY_GRPC_TARGET: "security:50065"
      MEMORY_GRPC_TARGET: "memory:50063"
      HEALTHCHECK_URL: "http://127.0.0.1:${CONTROL_PLANE_PORT:-8090}/health"
      STATE_BACKEND: "${STATE_BACKEND:-postgres}"
      OBJECT_STORAGE_REQUIRED: "${OBJECT_STORAGE_REQUIRED:-true}"
      STATE_ROOT_DIR: "${STATE_ROOT_DIR:-/var/lib/koda/state}"
      RUNTIME_EPHEMERAL_ROOT: "${RUNTIME_EPHEMERAL_ROOT:-/var/lib/koda/runtime}"
      ARTIFACT_STORE_DIR: "${ARTIFACT_STORE_DIR:-/var/lib/koda/artifacts}"
      CONTROL_PLANE_MASTER_KEY_FILE: "${CONTROL_PLANE_MASTER_KEY_FILE:-/var/lib/koda/state/control_plane/.master.key}"
      KNOWLEDGE_V2_STORAGE_MODE: "${KNOWLEDGE_V2_STORAGE_MODE:-primary}"
      KNOWLEDGE_V2_POSTGRES_DSN: "postgresql://${POSTGRES_USER:?Set POSTGRES_USER in .env}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:?Set POSTGRES_DB in .env}"
      KNOWLEDGE_V2_POSTGRES_SCHEMA: "${KNOWLEDGE_V2_POSTGRES_SCHEMA:-knowledge_v2}"
      KNOWLEDGE_V2_S3_BUCKET: "${KNOWLEDGE_V2_S3_BUCKET:-koda-objects}"
      KNOWLEDGE_V2_S3_PREFIX: "${KNOWLEDGE_V2_S3_PREFIX:-koda}"
      KNOWLEDGE_V2_S3_ENDPOINT_URL: "${KNOWLEDGE_V2_S3_ENDPOINT_URL:-http://seaweedfs:8333}"
      KNOWLEDGE_V2_S3_REGION: "${KNOWLEDGE_V2_S3_REGION:-us-east-1}"
      KNOWLEDGE_V2_S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:?Set S3_ACCESS_KEY_ID in .env}"
      KNOWLEDGE_V2_S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:?Set S3_SECRET_ACCESS_KEY in .env}"
    ports:
      - "${CONTROL_PLANE_PORT:-8090}:8090"
    volumes:
      - koda-state:/var/lib/koda/state
      - koda-runtime:/var/lib/koda/runtime
      - koda-artifacts:/var/lib/koda/artifacts
      - tmp-images:/app/tmp_images
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os, urllib.request; urllib.request.urlopen(os.environ.get('HEALTHCHECK_URL', 'http://127.0.0.1:8090/health'))\""
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        SECURE_COOKIES: "false"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /root/.cache
      - /app/apps/web/.next/cache
    depends_on:
      app:
        condition: service_healthy
    environment:
      HOST: "0.0.0.0"
      PORT: "3000"
      CONTROL_PLANE_BASE_URL: "http://app:8090"
      WEB_OPERATOR_SESSION_SECRET: "${WEB_OPERATOR_SESSION_SECRET:?Set WEB_OPERATOR_SESSION_SECRET in .env}"
    ports:
      - "${WEB_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - frontend
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  security:
    build:
      context: .
      dockerfile: Dockerfile.security
    restart: unless-stopped
    read_only: true
    environment:
      SECURITY_GRPC_TARGET: "0.0.0.0:50065"
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  memory:
    build:
      context: .
      dockerfile: Dockerfile.memory
    restart: unless-stopped
    read_only: true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MEMORY_GRPC_TARGET: "0.0.0.0:50063"
      KNOWLEDGE_V2_POSTGRES_DSN: "postgresql://${POSTGRES_USER:?Set POSTGRES_USER in .env}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:?Set POSTGRES_DB in .env}"
      KNOWLEDGE_V2_POSTGRES_SCHEMA: "${KNOWLEDGE_V2_POSTGRES_SCHEMA:-knowledge_v2}"
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:?Set POSTGRES_DB in .env}"
      POSTGRES_USER: "${POSTGRES_USER:?Set POSTGRES_USER in .env}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  seaweedfs:
    image: chrislusf/seaweedfs:4.05
    restart: unless-stopped
    command:
      - server
      - -dir=/data
      - -ip.bind=0.0.0.0
      - -s3
      - -s3.port=8333
      - -master.port=9333
      - -volume.port=8080
      - -filer.port=8888
    environment:
      AWS_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:?Set S3_ACCESS_KEY_ID in .env}"
      AWS_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:?Set S3_SECRET_ACCESS_KEY in .env}"
    volumes:
      - seaweedfs-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9333/cluster/status > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  seaweedfs-init:
    image: amazon/aws-cli:2.27.41
    depends_on:
      seaweedfs:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:?Set S3_ACCESS_KEY_ID in .env}"
      AWS_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:?Set S3_SECRET_ACCESS_KEY in .env}"
      AWS_DEFAULT_REGION: "${KNOWLEDGE_V2_S3_REGION:-us-east-1}"
      AWS_EC2_METADATA_DISABLED: "true"
      KNOWLEDGE_V2_S3_BUCKET: "${KNOWLEDGE_V2_S3_BUCKET:-koda-objects}"
      KNOWLEDGE_V2_S3_ENDPOINT_URL: "${KNOWLEDGE_V2_S3_ENDPOINT_URL:-http://seaweedfs:8333}"
    entrypoint:
      - /bin/sh
      - -c
      - |
        if ! aws --endpoint-url "$${KNOWLEDGE_V2_S3_ENDPOINT_URL}" s3api head-bucket --bucket "$${KNOWLEDGE_V2_S3_BUCKET}" >/dev/null 2>&1; then
          aws --endpoint-url "$${KNOWLEDGE_V2_S3_ENDPOINT_URL}" s3api create-bucket --bucket "$${KNOWLEDGE_V2_S3_BUCKET}" >/dev/null
        fi
        aws --endpoint-url "$${KNOWLEDGE_V2_S3_ENDPOINT_URL}" s3api head-bucket --bucket "$${KNOWLEDGE_V2_S3_BUCKET}" >/dev/null
    restart: "no"
    networks:
      - backend

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  koda-state:
  koda-runtime:
  koda-artifacts:
  postgres-data:
  seaweedfs-data:
  tmp-images:
