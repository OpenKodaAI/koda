syntax = "proto3";

package koda.rpc_gateway.v1;

import "common/v1/metadata.proto";

// koda-rpc-gateway — sidecar connection multiplexer (P0-3, P2-2, P2-3).
//
// Workers connect to ONE local UDS hosted by this gateway instead of
// opening their own gRPC channels to every sidecar. The gateway:
//   * pools connections to each sidecar replica with health-aware LB,
//   * trips a circuit breaker per upstream when failures exceed budget,
//   * propagates the worker's deadline correctly (today every RPC just
//     gets INTERNAL_RPC_DEADLINE_MS regardless of how much time is left
//     on the worker's user-facing request),
//   * applies per-workspace fairness on shared sidecars so a noisy
//     workspace cannot monopolize memory-engine or retrieval-engine.
//
// Workers continue to invoke the existing Rust services through their
// own .proto contracts — this file describes only the OPERATIONAL
// surface (routing config, breaker stats) the gateway itself exposes.

service RpcGatewayService {
  // Operator-facing diagnostics: which upstreams are healthy, current
  // breaker states, p99 latency per sidecar.
  rpc GetGatewayStatus(GetGatewayStatusRequest) returns (GetGatewayStatusResponse);

  // Reload routing config without restarting the gateway. The config
  // is also persisted to cp_rpc_gateway_routes so a restart picks it
  // up automatically; this RPC is for hot-swap during an incident.
  rpc UpdateRoutes(UpdateRoutesRequest) returns (UpdateRoutesResponse);
}

message UpstreamRoute {
  // Logical name workers invoke (e.g. "memory", "artifact", "security",
  // "retrieval", "runtime_kernel").
  string service = 1;
  // Concrete endpoints to load-balance across. Each is a host:port or
  // unix://... path. Removing an endpoint from this list drains it.
  repeated string endpoints = 2;
  // Failures within window_seconds before the breaker opens.
  int32 breaker_failure_threshold = 3;
  int32 breaker_window_seconds = 4;
  int32 breaker_open_seconds = 5;
}

message UpstreamHealth {
  string service = 1;
  string endpoint = 2;
  enum State {
    STATE_UNSPECIFIED = 0;
    STATE_HEALTHY = 1;
    STATE_DEGRADED = 2;
    STATE_BREAKER_OPEN = 3;
    STATE_UNREACHABLE = 4;
  }
  State state = 3;
  int32 in_flight = 4;
  double p99_latency_ms = 5;
  int64 errors_recent = 6;
}

message GetGatewayStatusRequest {
  koda.common.v1.RequestMetadata metadata = 1;
}

message GetGatewayStatusResponse {
  repeated UpstreamHealth upstreams = 1;
}

message UpdateRoutesRequest {
  koda.common.v1.RequestMetadata metadata = 1;
  repeated UpstreamRoute routes = 2;
}

message UpdateRoutesResponse {
  int32 routes_applied = 1;
}
