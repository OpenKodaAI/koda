metadata:
  repo_name: "koda"
  format_version: 1
  canonical_map_path: "docs/ai/repo-map.yaml"
  generator_script: "scripts/generate_repo_map.py"
  generation_mode: "deterministic-stdlib"
  llm_targets:
    - "generic-llm"
    - "codex"
    - "claude-code"
  summary: "Machine-readable index for repository structure, runtime flows, guardrails, change recipes, test ownership, and provider entrypoints."
  source_roots:
    - "koda"
    - "apps/web"
    - "tests"
    - "docs/ai"
    - "scripts"
  ignored_roots:
    - ".git"
    - ".venv"
    - "venv"
    - ".pytest_cache"
    - ".mypy_cache"
    - ".ruff_cache"
    - "__pycache__"
  ignored_patterns:
    - "*.db"
  notes:
    - "Semantic flows, guardrails, and change recipes are curated in the generator."
    - "File inventories for handlers, services, memory, skills, and tests are auto-discovered."
    - "Provider-neutral repository guidance lives in docs/ai, repo-map.yaml, README.md, and each SKILL.md file."
    - "Public product and contributor documentation lives under docs/, while docs/ai remains the repository guidance layer for humans and modern LLM tooling."
    - "AGENTS.md files are Codex-oriented entrypoints, while CLAUDE.md files mirror the same guidance for Claude Code."
    - "agents/openai.yaml files add optional Codex metadata and do not replace canonical skill instructions."
    - "The committed YAML is expected to match generator output exactly."
entrypoints:
  -
    id: "console-script"
    summary: "Package script entrypoint that resolves to the control-plane supervisor bootstrap."
    paths:
      - "pyproject.toml"
      - "koda/control_plane/__main__.py"
    related_tests:
      - "tests/test_control_plane_dashboard_api.py"
    related_docs:
      - "README.md"
      - "AGENTS.md"
      - "docs/ai/architecture-overview.md"
  -
    id: "web-dashboard"
    summary: "Next.js entrypoint for the Koda operations dashboard and runtime relay server."
    paths:
      - "package.json"
      - "pnpm-workspace.yaml"
      - "apps/web/package.json"
      - "apps/web/server.mjs"
    related_tests:
      - "apps/web/src/app/sessions/page.test.tsx"
      - "apps/web/src/components/memory/memory-dashboard-api.test.ts"
    related_docs:
      - "README.md"
      - "docs/install/local.md"
      - "docs/install/vps.md"
  -
    id: "telegram-runtime"
    summary: "Primary application entrypoint that sets environment, registers handlers, and starts polling."
    paths:
      - "koda/__main__.py"
    related_tests:
      - "tests/test_handlers/test_commands.py"
      - "tests/test_services/test_agent_loop.py"
    related_docs:
      - "README.md"
      - "AGENTS.md"
      - "docs/ai/architecture-overview.md"
      - "docs/ai/runtime-flows.md"
  -
    id: "compatibility-wrapper"
    summary: "Legacy file entrypoint that delegates directly to the package bootstrap."
    paths:
      - "agent.py"
    related_tests: []
    related_docs:
      - "README.md"
      - "docs/ai/architecture-overview.md"
  -
    id: "multi-agent-launcher"
    summary: "Process launcher for the configured multi-agent control-plane supervisor."
    paths:
      - "launcher.py"
      - "koda/control_plane/__main__.py"
    related_tests: []
    related_docs:
      - "README.md"
      - "docs/ai/architecture-overview.md"
  -
    id: "container-runtime"
    summary: "Container build and compose entrypoints for running the web dashboard, control plane, Postgres, and object storage."
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - "docker-compose.prod.yml"
    related_tests: []
    related_docs:
      - "README.md"
      - "docs/ai/architecture-overview.md"
module_areas:
