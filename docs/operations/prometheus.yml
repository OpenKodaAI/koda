# Prometheus scrape config used by docker-compose-observability.yml.
#
# Scrapes:
#   - app:8090     → /metrics (Phase 2D control-plane + worker stats)
#   - postgres-exporter:9187 → pg_stat_activity, connections, replication
#
# The koda Rust sidecars do NOT expose /metrics yet — that's a Phase
# E follow-up (each crate would need a separate hyper listener on
# port 9100). The grafana dashboards account for missing sidecar
# metrics with explanatory placeholders.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: koda-control-plane
    static_configs:
      - targets: ["app:8090"]
        labels:
          service: koda-app

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: koda-postgres

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
